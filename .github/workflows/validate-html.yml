name: Validate HTML

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run html-validate
        run: npx html-validate main.html index.html

      - name: Check JS syntax of extracted modules
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = 'js';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.js'));
          if (files.length === 0) throw new Error('Nenhum arquivo .js encontrado em js/');
          for (const f of files) {
            new Function(fs.readFileSync(path.join(dir, f), 'utf8'));
            console.log(f + ': sintaxe OK');
          }
          "

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
