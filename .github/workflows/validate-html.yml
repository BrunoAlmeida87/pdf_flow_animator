name: Validate HTML

# Nota (supply-chain): o ideal seria pinar as actions abaixo por SHA completo em vez de
# tag móvel (@v4). Não foi feito aqui porque o ambiente onde este workflow foi escrito
# não tinha como resolver/verificar os SHAs reais — pinar um SHA não verificado é pior
# que a tag. Para completar: `gh api repos/actions/checkout/git/ref/tags/v4.x.y`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run html-validate
        run: npx html-validate main.html index.html

      - name: Check JS syntax of extracted modules
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = 'js';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.js'));
          if (files.length === 0) throw new Error('Nenhum arquivo .js encontrado em js/');
          for (const f of files) {
            new Function(fs.readFileSync(path.join(dir, f), 'utf8'));
            console.log(f + ': sintaxe OK');
          }
          "

      # Cache dos browsers do Playwright — o passo de install é o mais lento do job
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
